<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .bg{fill:#fbfcff}.ink{fill:#101828}.muted{fill:#667085}.card{fill:white;stroke:#d0d5dd;stroke-width:2}.blue{fill:#2563eb}.green{fill:#059669}.orange{fill:#ea580c}.sans{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    </style>
  </defs>
  <rect class="bg" width="1080" height="1350"/>
  <text x="80" y="135" class="sans muted" font-size="30" font-weight="700">原理很简单</text>
  <text x="80" y="222" class="sans ink" font-size="68" font-weight="850">Codex 说 A 语言</text>
  <text x="80" y="300" class="sans ink" font-size="68" font-weight="850">国产模型说 B 语言</text>
  <text x="80" y="367" class="sans muted" font-size="31">Bridge 负责把两边互相翻译。</text>

  <rect x="80" y="470" width="920" height="140" rx="26" class="card"/>
  <circle cx="151" cy="540" r="28" class="blue"/>
  <text x="151" y="551" class="sans" fill="white" font-size="28" text-anchor="middle" font-weight="800">1</text>
  <text x="205" y="524" class="sans ink" font-size="34" font-weight="800">Codex 发出 Responses 请求</text>
  <text x="205" y="570" class="mono muted" font-size="24">POST /v1/responses</text>

  <rect x="80" y="655" width="920" height="140" rx="26" class="card"/>
  <circle cx="151" cy="725" r="28" class="blue"/>
  <text x="151" y="736" class="sans" fill="white" font-size="28" text-anchor="middle" font-weight="800">2</text>
  <text x="205" y="709" class="sans ink" font-size="34" font-weight="800">Bridge 转成 Chat Completions</text>
  <text x="205" y="755" class="mono muted" font-size="24">messages + tools + tool_calls</text>

  <rect x="80" y="840" width="920" height="140" rx="26" class="card"/>
  <circle cx="151" cy="910" r="28" class="green"/>
  <text x="151" y="921" class="sans" fill="white" font-size="28" text-anchor="middle" font-weight="800">3</text>
  <text x="205" y="894" class="sans ink" font-size="34" font-weight="800">上游模型返回文本或工具调用</text>
  <text x="205" y="940" class="mono muted" font-size="24">content / tool_calls</text>

  <rect x="80" y="1025" width="920" height="140" rx="26" class="card"/>
  <circle cx="151" cy="1095" r="28" class="orange"/>
  <text x="151" y="1106" class="sans" fill="white" font-size="28" text-anchor="middle" font-weight="800">4</text>
  <text x="205" y="1079" class="sans ink" font-size="34" font-weight="800">Bridge 再翻回 Codex 能识别的事件</text>
  <text x="205" y="1125" class="mono muted" font-size="24">message / function_call / output_text</text>

  <text x="80" y="1246" class="sans ink" font-size="31" font-weight="800">所以 Codex 不用改，模型服务也不用改。</text>
  <text x="80" y="1290" class="sans muted" font-size="26">中间多一个本地翻译层，就能把工作流接起来。</text>
</svg>
