<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>.s{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.m{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}</style>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="#FAFBFF"/>
  <rect width="1080" height="5" fill="url(#g)"/>

  <!-- 页眉 -->
  <text x="80" y="88" class="s" fill="#94A3B8" font-size="18" font-weight="700">PRINCIPLE</text>

  <!-- 大标题 -->
  <text x="80" y="195" class="s" fill="#0F172A" font-size="64" font-weight="900" letter-spacing="-2">原理很简单</text>
  <text x="80" y="268" class="s" fill="#475569" font-size="28" font-weight="400">Codex 说 Responses，国产模型听 Chat Completions</text>
  <text x="80" y="310" class="s" fill="#475569" font-size="28" font-weight="400">Bridge 在中间做双向翻译</text>

  <!-- 协议对比区 -->
  <rect x="60" y="370" width="460" height="240" rx="20" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="100" y="420" class="s" fill="#2563EB" font-size="20" font-weight="700">Codex 说的（Responses API）</text>
  <text x="100" y="470" class="m" fill="#1E40AF" font-size="16">POST /v1/responses</text>
  <text x="100" y="500" class="m" fill="#475569" font-size="15">input: [{ type: "message", ... }]</text>
  <text x="100" y="526" class="m" fill="#475569" font-size="15">tools: [{ type: "function", ... }]</text>
  <text x="100" y="552" class="m" fill="#475569" font-size="15">→ function_call / output_text</text>
  <text x="100" y="578" class="m" fill="#475569" font-size="15">→ apply_patch (文件编辑)</text>

  <rect x="560" y="370" width="460" height="240" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="600" y="420" class="s" fill="#059669" font-size="20" font-weight="700">国产模型听的（Chat Completions）</text>
  <text x="600" y="470" class="m" fill="#065F46" font-size="16">POST /chat/completions</text>
  <text x="600" y="500" class="m" fill="#475569" font-size="15">messages: [{ role, content }]</text>
  <text x="600" y="526" class="m" fill="#475569" font-size="15">tools: [{ type: "function", ... }]</text>
  <text x="600" y="552" class="m" fill="#475569" font-size="15">→ content / tool_calls</text>
  <text x="600" y="578" class="m" fill="#475569" font-size="15">→ choices[0].delta.content</text>

  <!-- 中间 Bridge 符号 -->
  <rect x="490" y="450" width="100" height="80" rx="40" fill="#0F172A" stroke="url(#g)" stroke-width="2"/>
  <text x="540" y="498" class="s" fill="#F8FAFC" font-size="16" font-weight="800" text-anchor="middle">⇄</text>

  <!-- 四步流程 -->
  <text x="80" y="680" class="s" fill="#0F172A" font-size="26" font-weight="800">翻译流程</text>

  <!-- Step 1 -->
  <rect x="60" y="710" width="960" height="108" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="124" cy="764" r="24" fill="#3B82F6"/>
  <text x="124" y="773" class="s" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">1</text>
  <text x="172" y="752" class="s" fill="#0F172A" font-size="24" font-weight="700">Codex 发出 Responses 请求</text>
  <text x="172" y="784" class="m" fill="#64748B" font-size="16">POST /v1/responses  →  input + tools + stream</text>

  <!-- Step 2 -->
  <rect x="60" y="834" width="960" height="108" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="124" cy="888" r="24" fill="#8B5CF6"/>
  <text x="124" y="897" class="s" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">2</text>
  <text x="172" y="876" class="s" fill="#0F172A" font-size="24" font-weight="700">Bridge 转成 Chat Completions 格式</text>
  <text x="172" y="908" class="m" fill="#64748B" font-size="16">input → messages · function_call → tool_calls · 补齐 call_id</text>

  <!-- Step 3 -->
  <rect x="60" y="958" width="960" height="108" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="124" cy="1012" r="24" fill="#10B981"/>
  <text x="124" y="1021" class="s" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">3</text>
  <text x="172" y="1000" class="s" fill="#0F172A" font-size="24" font-weight="700">上游模型返回文本或工具调用</text>
  <text x="172" y="1032" class="m" fill="#64748B" font-size="16">content / tool_calls → SSE chunks 流式返回</text>

  <!-- Step 4 -->
  <rect x="60" y="1082" width="960" height="108" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="124" cy="1136" r="24" fill="#F59E0B"/>
  <text x="124" y="1145" class="s" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">4</text>
  <text x="172" y="1124" class="s" fill="#0F172A" font-size="24" font-weight="700">Bridge 翻回 Responses 事件给 Codex</text>
  <text x="172" y="1156" class="m" fill="#64748B" font-size="16">tool_calls → function_call · delta → output_text.delta</text>

  <!-- 底部结论 -->
  <rect x="60" y="1220" width="960" height="68" rx="14" fill="#0F172A"/>
  <text x="540" y="1262" class="s" fill="#F8FAFC" font-size="22" font-weight="700" text-anchor="middle">Codex 不用改 · 模型服务不用改 · 中间多一个翻译层</text>

  <text x="540" y="1336" class="s" fill="#CBD5E1" font-size="14" text-anchor="middle">2 / 4</text>
</svg>
