<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>.s{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.m{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}</style>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="#FAFBFF"/>
  <rect width="1080" height="5" fill="url(#g)"/>

  <!-- 左上标签 -->
  <rect x="80" y="72" width="120" height="36" rx="18" fill="#EFF6FF"/>
  <text x="140" y="96" class="s" fill="#2563EB" font-size="18" font-weight="700" text-anchor="middle">开源项目</text>

  <!-- 主标题 -->
  <text x="80" y="210" class="s" fill="#0F172A" font-size="92" font-weight="900" letter-spacing="-3">Codex</text>
  <text x="80" y="302" class="s" fill="#0F172A" font-size="92" font-weight="900" letter-spacing="-3">Bridge</text>

  <!-- 一句话 -->
  <rect x="80" y="338" width="48" height="4" rx="2" fill="url(#g)"/>
  <text x="80" y="398" class="s" fill="#475569" font-size="34" font-weight="500">让 Codex Desktop 接入任何国产模型</text>

  <!-- 核心架构图 -->
  <rect x="60" y="478" width="960" height="400" rx="24" fill="#0F172A"/>

  <!-- Codex -->
  <rect x="120" y="608" width="210" height="140" rx="14" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
  <text x="225" y="668" class="s" fill="#F1F5F9" font-size="24" font-weight="700" text-anchor="middle">Codex</text>
  <text x="225" y="700" class="s" fill="#93C5FD" font-size="16" text-anchor="middle">Desktop</text>
  <rect x="160" y="714" width="130" height="22" rx="11" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <text x="225" y="730" class="m" fill="#60A5FA" font-size="11" text-anchor="middle">Responses API</text>

  <!-- Bridge (高亮) -->
  <rect x="435" y="568" width="210" height="200" rx="16" fill="#1E293B" stroke="url(#g)" stroke-width="3"/>
  <text x="540" y="656" class="s" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">Bridge</text>
  <text x="540" y="688" class="s" fill="#94A3B8" font-size="14" text-anchor="middle">协议双向转换</text>
  <rect x="484" y="710" width="112" height="22" rx="11" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="540" y="726" class="m" fill="#64748B" font-size="11" text-anchor="middle">localhost:8787</text>

  <!-- 国产模型 -->
  <rect x="750" y="608" width="210" height="140" rx="14" fill="#14332A" stroke="#10B981" stroke-width="2"/>
  <text x="855" y="668" class="s" fill="#F1F5F9" font-size="24" font-weight="700" text-anchor="middle">国产模型</text>
  <text x="855" y="700" class="s" fill="#6EE7B7" font-size="14" text-anchor="middle">GLM · 通义 · 千帆</text>
  <rect x="790" y="714" width="130" height="22" rx="11" fill="#14332A" stroke="#10B981" stroke-width="1"/>
  <text x="855" y="730" class="m" fill="#34D399" font-size="11" text-anchor="middle">Chat API</text>

  <!-- 箭头 -->
  <line x1="336" y1="678" x2="430" y2="678" stroke="#3B82F6" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="430,672 442,678 430,684" fill="#3B82F6"/>
  <line x1="651" y1="678" x2="745" y2="678" stroke="#10B981" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="745,672 757,678 745,684" fill="#10B981"/>

  <text x="383" y="650" class="s" fill="#60A5FA" font-size="12" font-weight="600" text-anchor="middle">翻译请求</text>
  <text x="698" y="650" class="s" fill="#34D399" font-size="12" font-weight="600" text-anchor="middle">翻译响应</text>

  <text x="540" y="838" class="s" fill="#64748B" font-size="16" text-anchor="middle">不是代理 · 不是套壳 · 是协议双向转换</text>

  <!-- 四标签 -->
  <rect x="80" y="944" width="192" height="52" rx="26" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="176" y="978" class="s" fill="#2563EB" font-size="20" font-weight="700" text-anchor="middle">🔄 流式输出</text>

  <rect x="300" y="944" width="192" height="52" rx="26" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="396" y="978" class="s" fill="#059669" font-size="20" font-weight="700" text-anchor="middle">🔧 工具调用</text>

  <rect x="520" y="944" width="192" height="52" rx="26" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="616" y="978" class="s" fill="#C2410C" font-size="20" font-weight="700" text-anchor="middle">📝 文件编辑</text>

  <rect x="740" y="944" width="220" height="52" rx="26" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="850" y="978" class="s" fill="#7C3AED" font-size="20" font-weight="700" text-anchor="middle">🛡️ 畸形修复</text>

  <!-- 底部信息 -->
  <text x="80" y="1090" class="s" fill="#0F172A" font-size="30" font-weight="700">一个本地协议翻译层</text>
  <text x="80" y="1136" class="s" fill="#64748B" font-size="22">不是替代官方，是让更多模型进入 Codex 工作流</text>

  <rect x="60" y="1196" width="960" height="72" rx="14" fill="#F1F5F9"/>
  <text x="100" y="1240" class="m" fill="#3B82F6" font-size="18">github.com/LayLIiu/codex-bridge</text>
  <text x="880" y="1240" class="s" fill="#94A3B8" font-size="16" text-anchor="end">MIT · 零依赖 · Node 18+</text>

  <text x="540" y="1336" class="s" fill="#CBD5E1" font-size="14" text-anchor="middle">1 / 4</text>
</svg>
