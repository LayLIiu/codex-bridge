<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    .header {
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .header .icon { font-size: 22px; }

    /* ── url input row ── */
    .url-row {
      padding: 0 24px 14px;
      display: flex;
      gap: 8px;
    }
    .url-row input {
      flex: 1;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 9px 12px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .url-row input:focus { border-color: #4fc3f7; }
    .url-row input::placeholder { color: #555; }

    /* ── controls ── */
    .controls {
      padding: 0 24px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-start { background: #00c853; color: #fff; }
    .btn-start:hover:not(:disabled) { background: #00e676; }
    .btn-stop  { background: #ff1744; color: #fff; }
    .btn-stop:hover:not(:disabled)  { background: #ff5252; }

    .status {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .dot-on  { background: #00e676; box-shadow: 0 0 6px #00e676; }
    .dot-off { background: #666; }

    /* ── bridge url display ── */
    .bridge-url {
      padding: 0 24px 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .bridge-url.show { display: flex; }
    .bridge-url code {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      color: #4fc3f7;
      flex: 1;
      user-select: all;
    }
    .btn-copy {
      background: #0f3460;
      color: #e0e0e0;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-copy:hover { background: #1a4a8a; }

    /* ── log ── */
    .log-label {
      padding: 0 24px 6px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .log {
      flex: 1;
      margin: 0 24px 16px;
      background: #0a0a1a;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: "Cascadia Code", "Fira Code", Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log::-webkit-scrollbar { width: 6px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🌉</span>
    <h1>Codex Bridge</h1>
  </div>

  <div class="url-row">
    <input id="url" type="text" placeholder="服务商 URL，如 https://qianfan.baidubce.com/v2/coding" />
  </div>

  <div class="controls">
    <button id="btnStart" class="btn btn-start">启动</button>
    <button id="btnStop"  class="btn btn-stop" disabled>停止</button>
    <div class="status">
      <span id="dot" class="dot dot-off"></span>
      <span id="statusText">未运行</span>
    </div>
  </div>

  <div id="bridgeUrl" class="bridge-url">
    <code id="bridgeUrlText">http://127.0.0.1:8787/v1</code>
    <button id="btnCopy" class="btn-copy">复制</button>
  </div>

  <div class="log-label">日志</div>
  <div id="log" class="log"></div>

  <script src="renderer.js"></script>
</body>
</html>
